services:
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
      admin:
        condition: service_started
      api:
        condition: service_started
    env_file:
      - .env.staging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/staging/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  web:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    restart: unless-stopped
    env_file:
      - .env.staging
    environment:
      PORT: 3000
    depends_on:
      api:
        condition: service_healthy

  admin:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.admin
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    restart: unless-stopped
    env_file:
      - .env.staging
    environment:
      PORT: 3001
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.api
    restart: unless-stopped
    env_file:
      - .env.staging
    environment:
      PORT: 4000
    volumes:
      - ega_staging_media_data:/app/storage/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.staging
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ega_staging_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ega_staging_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:v1.27
    restart: unless-stopped
    ports:
      - "1026:1025"
      - "8026:8025"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8025"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  ega_staging_postgres_data:
  ega_staging_redis_data:
  ega_staging_media_data:
  caddy_data:
  caddy_config:

# Future Alternative Deployment / Experimental.
#
# Official first beta deployment strategy is PM2 + Nginx. Do not use this
# Docker/Caddy compose stack for the first VPS beta unless the release owner
# explicitly changes the deployment strategy.

services:
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
      admin:
        condition: service_started
      api:
        condition: service_healthy
    env_file:
      - .env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/production/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  web:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PORT: 3000
      APP_GIT_SHA: ${APP_GIT_SHA:-unknown}
      APP_GIT_BRANCH: ${APP_GIT_BRANCH:-production}
    depends_on:
      api:
        condition: service_healthy

  admin:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.admin
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PORT: 3001
      APP_GIT_SHA: ${APP_GIT_SHA:-unknown}
      APP_GIT_BRANCH: ${APP_GIT_BRANCH:-production}
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PORT: 4000
      APP_GIT_SHA: ${APP_GIT_SHA:-unknown}
      APP_GIT_BRANCH: ${APP_GIT_BRANCH:-production}
    volumes:
      - ega_prod_media_data:/app/storage/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ega_prod_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ega_prod_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  ega_prod_postgres_data:
  ega_prod_redis_data:
  ega_prod_media_data:
  caddy_data:
  caddy_config:
